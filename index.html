<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<link rel='stylesheet' href="style/style.css">



<title>BiblioteKaia - Biblioteca de animação</title>

</head>

<body>

<header>

<h1> BiblioteKaia </h1>
<h4> A Biblioteca de animação da Kaia </h4>

<div class="filtros">
    <select id="filtroTags" multiple aria-placeholder="Tags"> </select>
    <input type="text" id="searchInput" placeholder="Pesquisar vídeos...">
    <button id="btnNovaTag"> Nova Tag </button>
    <a href="upload.html" class="pagina"> Adicionar ciclos </a>
</div>


<div id="tagModal" class="modal">
    <div class="modal-content">
        <h3>Criar Nova Tag</h3>
       <div class="tag-row">
        <input type="text" id="novaTag" placeholder="Nome da tag">
        <input type="color" id="tagColor" value="#3b82f6">

        <input type="text" id="tagEmoji" placeholder="😀"readonly>
        <button type="button" id="btnEmoji" title="Selecionar Emoji"> 😀 </button>
        
    </div>

        <div id="emojiContainer">
            <emoji-picker></emoji-picker>
        </div>

        <div class="modal-buttons">
            <button id="saveTag">
                Salvar
            </button>
            <button id="cancelTag">
                Cancelar
            </button>
        </div>

        <hr>

        <h4>Tags cadastradas</h4>

        <div id="listaTags"></div>

    </div>

</div>
</header>



<main
    class="gallery"
    id="gallery">
</main>

<div id="modalTag" class="modal">
   
    <div class="modal-content">
         <h3 id="tituloModalTag"></h3>
        <select
            id="selectTagsVideo"
            multiple>
        </select>

        <div class="modal-buttons">

            <button
                id="saveTagsVideo"
                type="button">
                Salvar

            </button>

            <button
                id="cancelTag"
                type="button"
                onclick="fecharModalTag()">

                Cancelar

            </button>

        </div>

    </div>

</div>



<!--  Editar / Adicionar descrição -->
<div id="modalEditar" class="modal">
    <div class="modal-content">
        <h3 id="editTitulo">Editar vídeo</h3>
        <textarea id="editDescricao"
                  placeholder="Descrição do vídeo"></textarea>
        <div class="modal-buttons">
            <button id="btnSalvarEdit"
                    type="button"
                    onclick="salvarEdicao()">
                Salvar
            </button>
            <button type="button"
                    onclick="fecharEditar()">
                Cancelar
            </button>
        </div>
    </div>
</div>


<div id="modalLogin" class="modal-login">
    <div class="modal-login-content">
        <div class="img-login">
                <img src="img/login.png" class="imagem-login">
            </div>
            <section id="login">
                <div class="formulario">
                    <h1> Acessar</h1>
        
                    <form id="formLogin">
            
                        <input type="password" id="senha" name="password" placeholder=" Digite a Senha" class="senha" required>

                        <div class="btn">
                            <input type="submit" class="entrar" value="Entrar" id="btn-login">
                        </div>
                        <div id="erro" style="display:none;">
                            Senha Incorreta! Tente Novamente 
                        </div>
                    </form>
                </div>
            </section>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
<script src="js/script.js"></script>
<script src="js/tags.js"></script>
<script src="js/edicao.js"></script>




</body>


</html>
