<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel='stylesheet' href="style/style.css">


<title>BiblioteKaia - Biblioteca de animação</title>

</head>

<body>

<header>

<h1> BiblioteKaia </h1>
<h4> A Biblioteca de animação da Kaia </h4>

<button id="btnNovaTag">
    + Nova Tag
</button>

<div id="tagModal" class="modal">

    <div class="modal-content">

        <h3>Nova Tag</h3>

        <input
            type="text"
            id="novaTag"
            placeholder="Nome da tag"
        >

        <div class="modal-buttons">

            <button id="cancelTag">
                Cancelar
            </button>

            <button id="saveTag">
                Salvar
            </button>

        </div>

    </div>

</div>

</header>

<main
    class="gallery"
    id="gallery">
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/script.js"></script>


</body>


</html>
