<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Upload de Vídeos</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      padding: 20px;
    }

    .box {
      max-width: 500px;
      margin: auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: #00c2ff;
      border: none;
      cursor: pointer;
    }

    video {
      width: 100%;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<div class="box">
  <h2> Adicione os ciclos </h2>


  <input type="file" id="video" accept="video/*" multiple>
  
  <input id="descricao" placeholder="Descrição">
  <input id="tags" placeholder="Tags">

  

  <video id="preview" controls loop></video>

 <button id="btnUpload">Enviar</button>

  <p id="status"></p>
  <div id="queue"></div>
</div>



<script type="module" src="upload.js"></script>

</body>
</html>
