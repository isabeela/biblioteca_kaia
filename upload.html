<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Upload de Vídeos</title>
  <link rel='stylesheet' href="style/upload.css">
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
</head>

<body>


  <h2> Adicione os ciclos </h2>


  <div id="drop-zone">
    <h3>🎬 Arraste vídeos aqui</h3>
    <p>ou clique para selecionar</p>

    <input type="file" id="video" multiple accept="video/*">
  </div>
  
  <!-- <input id="descricao" placeholder="Descrição">
  <input id="tags" placeholder="Tags"> -->

  

  <video class="preview-video" controls loop></video>



    <p id="status"></p>
    <div id="queue"></div>

  <div class="upload-actions">
      <button id="btnUpload">
          Enviar Todos
      </button>
  </div>


<script type="module" src="upload.js"></script>
<script src="js/tags.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

</body>
</html>
